<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Novus</title>
<style>
:root{
  --brand:#0f172a;--brand-h:#020617;--brand-light:#f1f5f9;
  --accent:#e8580c;--accent-h:#c2410c;--accent-bg:#fff7ed;--accent-light:#fed7aa;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-text:#6d28d9;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-text:#0f766e;
  --orange:#e8580c;--orange-bg:#fff7ed;--orange-text:#c2410c;
  --bg:#f8fafc;--white:#fff;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --r:8px;--rl:12px;
  --sh:0 1px 2px rgba(0,0,0,.06);
  --shm:0 2px 8px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.04);
  --shl:0 10px 24px rgba(15,23,42,.1),0 2px 8px rgba(15,23,42,.05);
  --sw:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--brand);display:flex;flex-direction:column;height:100vh;transition:transform .25s;z-index:50;}
#slogo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06);}
.lw{display:flex;align-items:center;gap:12px;}
.ls{flex-shrink:0;}
.ls svg{border-radius:8px;}
.ln{color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;}.lsb{color:rgba(255,255,255,.35);font-size:10px;margin-top:1px;}
#snav{flex:1;padding:12px 10px;overflow-y:auto;}
.nl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(232,88,12,.45);padding:14px 10px 6px;display:block;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none;}
.ni:hover{background:rgba(232,88,12,.08);color:rgba(255,255,255,.9);}
.ni.active{background:rgba(232,88,12,.15);color:#e8580c;}
.ni svg{width:15px;height:15px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;opacity:.7;}
.ni.active svg{opacity:1;stroke:#e8580c;}
#sfoot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);}
.fu{display:flex;align-items:center;gap:10px;}
.fav{width:30px;height:30px;background:linear-gradient(135deg,#e8580c,#c2410c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0;}
.fn{color:rgba(255,255,255,.85);font-size:12px;font-weight:600;}
.fr{color:rgba(255,255,255,.3);font-size:10px;text-transform:capitalize;}
.bso{margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;}
.bso:hover{border-color:rgba(232,88,12,.4);color:#e8580c;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
#mbtn{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text2);}
#mbtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;}
#ptitle{font-size:16px;font-weight:700;color:var(--brand);}
#tactions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:24px;}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1;}
.bp{background:var(--accent);color:#fff;}.bp:hover{background:var(--accent-h);}
.bs{background:var(--green);color:#fff;}.bs:hover{background:#15803d;}
.bd{background:var(--red);color:#fff;}.bd:hover{background:#b91c1c;}
.bsec{background:var(--white);color:var(--text);border:1px solid var(--border2);}.bsec:hover{border-color:var(--accent);color:var(--accent);}
.bg{background:transparent;color:var(--text2);}.bg:hover{background:var(--accent-bg);color:var(--accent);}
.bsm{padding:6px 11px;font-size:12px;}
.bxs{padding:4px 9px;font-size:11px;border-radius:6px;}
.card{background:var(--white);border-radius:var(--rl);box-shadow:var(--shm);border:1px solid var(--border);margin-bottom:18px;overflow:hidden;}
.ch{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.ch h2{font-size:14px;font-weight:700;color:var(--brand);}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sc{background:var(--white);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--shm);border:1px solid var(--border);position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .15s;}
.sc:hover::before{opacity:1;}
.slb{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.sv{font-size:28px;font-weight:800;color:var(--brand);line-height:1;}
.ssb{font-size:11px;color:var(--text3);margin-top:5px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);background:#fdf8f4;border-bottom:2px solid var(--accent-light);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--accent-bg);}
.mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px;}
.muted{color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sn{background:#f1f5f9;color:#475569;}.sn .dot{background:#94a3b8;}
.sm2{background:#fefce8;color:#854d0e;}.sm2 .dot{background:#d97706;}
.sip{background:#f5f3ff;color:#6d28d9;}.sip .dot{background:#7c3aed;}
.srd{background:#f0fdf4;color:#15803d;}.srd .dot{background:#16a34a;}
.sin{background:#f1f5f9;color:#374151;}.sin .dot{background:#6b7280;}
.bgr{background:var(--green-bg);color:var(--green-text);}
.brd{background:var(--red-bg);color:var(--red-text);}
.bam{background:var(--amber-bg);color:var(--amber-text);}
.bbl{background:var(--blue-bg);color:var(--blue-text);}
.bpu{background:var(--purple-bg);color:var(--purple-text);}
.btl{background:var(--teal-bg);color:var(--teal-text);}
.bor{background:var(--orange-bg);color:var(--orange-text);}
.bgy{background:#f1f5f9;color:#475569;}
.qd{background:#f8fafc;color:#64748b;}
.qs{background:var(--blue-bg);color:var(--blue-text);}
.qa{background:var(--green-bg);color:var(--green-text);}
.qc{background:var(--purple-bg);color:var(--purple-text);}
.tp{background:#f8fafc;color:#64748b;}
.ti{background:var(--blue-bg);color:var(--blue-text);}
.td2{background:var(--green-bg);color:var(--green-text);}
.plo{background:var(--green-bg);color:var(--green-text);}
.pme{background:var(--amber-bg);color:var(--amber-text);}
.phi{background:var(--red-bg);color:var(--red-text);}
.pur{background:#450a0a;color:#fca5a5;}
.ro{background:var(--purple-bg);color:var(--purple-text);}
.ra{background:var(--teal-bg);color:var(--teal-text);}
.rs{background:var(--blue-bg);color:var(--blue-text);}
.rw{background:var(--orange-bg);color:var(--orange-text);}
.ri{background:var(--amber-bg);color:var(--amber-text);}
.rf{background:var(--green-bg);color:var(--green-text);}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.fg label{font-size:12px;font-weight:600;color:var(--text2);}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border .15s,box-shadow .15s;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,88,12,.1);}
.fg textarea{resize:vertical;min-height:70px;}
.fg input[type=color]{height:36px;padding:2px 4px;cursor:pointer;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.fss{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:12px 0 7px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.md{background:var(--white);border-radius:12px;box-shadow:var(--shl);width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;border:1px solid var(--border);}
.msm{max-width:440px;}.mmd{max-width:640px;}.mlg{max-width:860px;}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:12px 12px 0 0;}
.mh h3{font-size:15px;font-weight:700;}
.mx{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.mx:hover{background:var(--bg);}
.mb{padding:20px;flex:1;}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white);border-radius:0 0 12px 12px;}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.tab:hover:not(.active){color:var(--accent);background:var(--accent-bg);border-radius:6px 6px 0 0;}
.swg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.swc{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;background:var(--white);}
.swc:hover{box-shadow:var(--shl);border-color:var(--border2);}
.swt{height:72px;position:relative;}
.swp{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;}
.swb{padding:10px;}.swn{font-size:12px;font-weight:600;margin-bottom:1px;}.swco{font-size:10px;color:var(--text3);}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cdh{background:var(--bg);text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:7px 0;}
.cd{min-height:88px;background:var(--white);padding:6px;cursor:pointer;}
.cd:hover{background:#fafafa;}
.ct{background:var(--accent-bg) !important;}.ct .cdn{color:var(--accent);font-weight:700;}
.com{background:var(--bg);opacity:.6;}
.cdn{font-size:11px;color:var(--text2);margin-bottom:2px;}
.cev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ei{background:#dcfce7;color:#166534;}.em2{background:#dbeafe;color:#1e40af;}.eme{background:#ede9fe;color:#5b21b6;}.eot{background:#f1f5f9;color:#374151;}
.lp{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;}
.stb{height:4px;border-radius:2px;background:var(--border);overflow:hidden;}
.stbf{height:100%;border-radius:2px;}
#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--brand);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;animation:tin .2s ease;box-shadow:var(--shl);border-left:3px solid var(--accent);}
.te{background:#b91c1c;border-left-color:#fca5a5;}.tw2{background:#92400e;border-left-color:#fbbf24;}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.pgload{display:flex;align-items:center;justify-content:center;padding:80px 0;}
.pgload::after{content:'';width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
.empty{text-align:center;padding:44px 20px;}
.et{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:3px;}
.esb{font-size:12px;color:var(--text3);}
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.ibl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px;}
.ibv{font-size:13px;font-weight:600;}.ibsb{font-size:11px;color:var(--text2);margin-top:1px;}
.cprev{border-radius:7px;padding:10px;text-align:center;}
.cprev .cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:inherit;opacity:.7;margin-bottom:3px;}
.cprev .cv{font-size:16px;font-weight:800;font-family:'SF Mono',monospace;}
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
  #sidebar.open{transform:none;}.ov.show{display:block;}#mbtn{display:block;}
  .sg{grid-template-columns:1fr 1fr;}.fr2,.fr3,.fr4{grid-template-columns:1fr;}
  .ig{grid-template-columns:1fr 1fr;}
  .md{border-radius:12px 12px 0 0;margin-top:auto;}
  .mo{align-items:flex-end;padding:0;}.mlg,.mmd{max-width:100%;}
  .qb-adj{grid-template-columns:1fr !important;}
  .qb-actions{flex-direction:column !important;}
  .qb-actions .btn{width:100%;justify-content:center;}
  .qbc-loc,.qbc-type{min-width:140px;}
  /* Touch-friendly: prevent iOS zoom, min tap targets */
  input,select,textarea{font-size:16px !important;}
  .btn{min-height:44px;}
  .fr2{gap:10px;}
  .fg label{font-size:13px;}
  .fg input,.fg select,.fg textarea{padding:10px !important;}
  .fss{font-size:15px;}
}
.qb-cards{display:none;}
/* compact table */
.qb-table-wrap table{border-collapse:collapse;width:100%;}
.qb-table-wrap th,.qb-table-wrap td{padding:4px 5px;white-space:nowrap;}
.qb-table-wrap input,.qb-table-wrap select{box-sizing:border-box;}
.qb-view-tog{display:flex;gap:4px;}
.qb-view-tog .btn{padding:3px 10px;font-size:11px;}
/* Compact card layout */
.qb-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.qbc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.qbc-num{font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;min-width:16px;}
.qbc-loc{flex:2;min-width:100px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text);}
.qbc-type{flex:0 0 auto;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text);}
.qbc-btns{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.qbc-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:flex-end;}
.qbc-field{display:flex;flex-direction:column;gap:2px;}
.qbc-field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;}
.qbc-field input,.qbc-field select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text);}
.qbc-grow{flex:1;min-width:140px;}
.qbc-vsep{width:1px;background:var(--border);align-self:stretch;margin:0 2px;}
.qbc-foot-val{font-size:15px;color:var(--accent);font-weight:800;font-family:'SF Mono',monospace;padding:6px 0;}
@media(max-width:600px){
  .qbc-loc,.qbc-type{flex:1 1 140px;}
  .qbc-field input,.qbc-field select,.qbc-loc,.qbc-type{font-size:16px !important;}
}
@media(max-width:480px){.sg{grid-template-columns:1fr;}#content{padding:10px;}.card{border-radius:8px;}}
@media print{#sidebar,#topbar,.btn,#toasts{display:none!important;}#main,#content{overflow:visible!important;height:auto!important;}}
</style>
</head>
<body>
<div id="app">
<nav id="sidebar">
  <div id="slogo"><div class="lw"><div class="ls"><svg viewBox="0 0 64 64" width="38" height="38"><rect width="64" height="64" rx="14" fill="#1e293b"/><g transform="translate(10,10)"><rect x="0" y="0" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".3"/><rect x="0" y="7" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".5"/><rect x="0" y="14" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".7"/><rect x="0" y="21" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".85"/><rect x="0" y="28" width="44" height="5" rx="1.5" fill="#e8580c"/><rect x="0" y="35" width="44" height="9" rx="1.5" fill="#e8580c"/><path d="M0 0L0 44L9 44L9 17L35 44L44 44L44 0L35 0L35 27L9 0Z" fill="#1e293b" fill-rule="evenodd"/></g></svg></div><div><div class="ln">Novus</div></div></div></div>
  <div id="snav"></div>
  <div id="sfoot"><div class="fu"><div class="fav" id="uav">?</div><div><div class="fn" id="uname">—</div><div class="fr" id="urole">—</div></div><button class="bso" onclick="logout()">Sign out</button></div></div>
</nav>
<div id="ov" onclick="closeSidebar()"></div>
<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button id="mbtn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span id="ptitle">Loading</span>
    </div>
    <div id="tactions"></div>

  <div id="content"></div>
</div>
</div>

<div id="modal-root"></div>
<script>
// ── CORE ──
const $=id=>document.getElementById(id);
let ME=null,TOKEN=null,_fabs=[],_hw=[],_profs=[],_users=[],_cJob=null;
let calY=new Date().getFullYear(),calM=new Date().getMonth()+1;
const LOCS=['Warehouse','Factory','Installer'];
const LC={Warehouse:'#2563eb',Factory:'#7c3aed',Installer:'#d97706'};
const PDATA={A:{c:-.375,r:-1.0625,br:-1.0625,bc:-1.25},B:{c:-.375,r:-.875,br:-.875,bc:-1.0625},C:{c:-.3125,r:-.75,br:-.75,bc:-.875},D:{c:-.3125,r:-.5625,br:-.5625,bc:-.6875},E:{c:0,r:-1.125,br:-1.125,bc:0},F:{c:-.375,r:-1.0625,br:-1.0625,bc:0},G:{c:-.375,r:-.875,br:-.875,bc:0},H:{c:-.3125,r:-.875,br:-.875,bc:-1.0625},I:{c:-.3125,r:-.75,br:-.75,bc:-.875},J:{c:-.375,r:-1.0,br:-1.0,bc:0}};

async function api(m,p,b){
  const o={method:m,headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(p,o);
  if(r.status===401){logout();return;}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Request failed');}
  return r.json();
}

function toFrac(v){
  if(v==null||isNaN(v))return'—';
  v=parseFloat(v);const neg=v<0;if(neg)v=-v;
  const whole=Math.floor(v);const dec=v-whole;
  // Round to nearest 1/16 (cut sheet precision)
  const ei=Math.round(dec*16);
  if(ei===0)return(neg?'-':'')+whole+'"';
  if(ei===16)return(neg?'-':'')+(whole+1)+'"';
  const n=ei,d=16;
  const wp=whole>0?whole+' ':'';
  return(neg?'-':'')+wp+n+'/'+d+'"';
}

  if(!cid){const n=$('njn').value.trim();if(!n){toast('Client name required','err');return;}const c=await post('/api/clients',{name:n,address:$('nja').value,phone:$('njp').value});cid=c.id;}

async function rJobDetail(id){
  const needFabs=!_fabs.length,needProfs=!_profs.length;
  const reqs=[get('/api/jobs/'+id)];
  if(needFabs)reqs.push(get('/api/fabrics'));
  if(needProfs)reqs.push(get('/api/profiles'));

  $('ptitle').textContent=_cJob.job_number;
  const ce=can('owner','admin','sales','warehouse'),cc=can('owner','admin','warehouse','factory');
  $('tactions').innerHTML=`${_cJob.quote_id?`<button class="btn bsec bsm" onclick="nav('quote-edit',${_cJob.quote_id})">View Quote</button>`:''}${ce?`<select class="btn bsec bsm" style="font-weight:600" onchange="updJS(${id},this.value)">${['new','measured','in_production','ready','installed'].map(s=>`<option value="${s}" ${_cJob.status===s?'selected':''}>${{new:'New',measured:'Measured',in_production:'In Production',ready:'Ready',installed:'Installed'}[s]}</option>`).join('')}</select>`:''}${cc?`<button class="btn bsec bsm" onclick="printS(${id},'fabric')">Fabric Sheet</button><button class="btn bsec bsm" onclick="printS(${id},'hardware')">Hardware Sheet</button><button class="btn bsec bsm" onclick="printAssembly(${id})">Assembly Sheet</button>`:''}${ce?`<button class="btn bp bsm" onclick="mAddWin(${id})">Add Window</button>`:''}`;
  const j=_cJob;

  <div class="card"><div class="ch"><h2>Windows (${j.windows.length})</h2>${ce?`<button class="btn bp bsm" onclick="mAddWin(${id})">Add Window</button>`:''}</div><div class="tw"><table><thead><tr><th>#</th><th>Location</th><th>Fabric</th><th>Profile</th><th>Width</th><th>Length</th><th>Mount</th><th>Control</th>${cc?`<th>Cassette Cut</th><th>Bottom Rail</th><th>Fabric Width</th><th>Fabric Drop</th>`:''}<th>Production</th><th>Cord</th><th>Brackets</th><th></th></tr></thead><tbody id="wt"></tbody></table></div></div>`;
  renderWT(j.windows,cc,ce);
}
function renderWT(wins,cc,ce){
  $('wt').innerHTML=wins.length?wins.map(w=>`<tr><td class="muted">${w.window_no}</td><td><strong>${w.location||'—'}</strong></td><td><div style="display:flex;align-items:center;gap:7px"><div style="width:13px;height:13px;border-radius:3px;background:${w.colour_hex||'#ccc'};border:1px solid var(--border);flex-shrink:0"></div><div><div style="font-weight:600;font-size:12px">${w.fabric_alias||'—'}</div><span class="mono" style="font-size:10px">${w.catalogue_no||''}</span></div></div></td><td><span class="badge bpu">Profile ${w.profile_code||'—'}</span></td><td class="mono">${ms(w.width_in,w.width_frac)}</td><td class="mono">${ms(w.length_in,w.length_frac)}</td><td>${w.mount_type==='in'||w.mount_type==='I'?'<span class="badge btl">Inside</span>':'<span class="badge bam">Outside</span>'}</td><td class="muted">${w.control_type||'—'} ${w.lr_side||''}</td>${cc?`<td class="mono"><strong>${toFrac(w.cut_cassette)}</strong></td><td class="mono"><strong>${toFrac(w.cut_bottom_rail)}</strong></td><td class="mono" style="color:var(--green-text)"><strong>${toFrac(w.cut_fabric_width)}</strong></td><td class="mono" style="color:var(--green-text)"><strong>${toFrac(w.cut_fabric_drop)}</strong></td>`:''}<td>${prodBadge(w.production_status||'pending')}</td><td class="muted">${w.cord_wand_size||'—'}</td><td class="muted">${w.bracket_count||0}×</td><td>${ce?`<button class="btn bg bxs" style="color:var(--red)" onclick="dWin(${w.id})">Remove</button>`:''}</td></tr>`).join(''):emp('No windows added','Click "Add Window" to begin measuring');

async function updJS(id,s){await patch('/api/jobs/'+id,{status:s});toast('Status updated');}
async function dWin(id){if(!confirm('Remove window?'))return;await del('/api/windows/'+id);toast('Window removed');rJobDetail(_cJob.id);}
async function mAddWin(jid){
  const fo=FRACS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
  openModal(`<div class="md mlg"><div class="mh"><h3>Add Window</h3><button class="mx" onclick="closeModal()">✕</button></div><div class="mb">
    <div class="fr2"><div class="fg"><label>Location / Label</label><input id="awl" placeholder="e.g. Living Room — Left"/></div><div class="fg"><label>Notes</label><input id="awn" placeholder="Optional"/></div></div>
    <div class="fss">Measurements (inches)</div>
    <div class="fr4"><div class="fg"><label>Width (whole)</label><input type="number" id="aww" placeholder="72" oninput="lc()"/></div><div class="fg"><label>Width Fraction</label><select id="awwf" onchange="lc()">${fo}</select></div><div class="fg"><label>Drop (whole)</label><input type="number" id="awh" placeholder="54" oninput="lc()"/></div><div class="fg"><label>Drop Fraction</label><select id="awhf" onchange="lc()">${fo}</select></div></div>
    <div class="fss">Configuration</div>
    <div class="fr2"><div class="fg"><label>Blind Type</label><select id="awbt" onchange="lc()"><option value="Zebra">Zebra</option><option value="Roller">Roller</option><option value="Double Roller">Double Roller</option></select></div><div class="fg"><label>Fabric</label><select id="awfab" onchange="lc()"><option value="">— Select fabric —</option>${_fabs.map(f=>`<option value="${f.id}" data-c="${f.catalogue_no}" data-s="${f.slat_size||0}">${f.catalogue_no} — ${f.alias} (${fn(f.remaining,1)}m available)</option>`).join('')}</select></div><div class="fg"><label>Profile (Material Type)</label><select id="awpr" onchange="lc()"><option value="">— Select profile —</option>${_profs.map(p=>`<option value="${p.code}">${p.code} — ${p.blind_type.toUpperCase()} — ${p.description}</option>`).join('')}</select></div><div class="fg"><label>Cassette Colour</label><select id="awcas" onchange="lc()"><option value="White">White</option><option value="Black">Black</option><option value="Grey">Grey</option><option value="Silver">Silver</option><option value="Mill">Mill (no cassette)</option></select></div><div class="fg"><label>Mount</label><select id="awmt" onchange="lc()"><option value="in">Inside (IB)</option><option value="out">Outside (OB)</option></select></div><div class="fg"><label>Control</label><select id="awct" onchange="lc()"><option value="chain">Chain</option><option value="wand">Wand</option><option value="motor">Motor</option><option value="motor-tubular">Motor Tubular</option></select></div><div class="fg"><label>Control Side</label><select id="awlr"><option value="R">Right</option><option value="L">Left</option></select></div></div>
    <div class="fss">Calculated Cuts (live preview)</div>

  </div><div class="mf"><button class="btn bsec" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="addWin(${jid})">Save Window</button></div></div>`);
}
function lc(){
  const w=parseFloat($('aww')?.value)||0,wf=parseFloat($('awwf')?.value)||0,h=parseFloat($('awh')?.value)||0,hf=parseFloat($('awhf')?.value)||0;
  const pr=$('awpr')?.value,cas=$('awcas')?.value||'White',ct=$('awct')?.value||'chain';
  const fabSel=$('awfab')?.selectedOptions[0];
  const fc=fabSel?.dataset.c||'';
  const slat=parseFloat(fabSel?.dataset.s||3)||3;
  const bt=($('awbt')?.value||'Zebra').toLowerCase();
  if(!w||!h||!pr){$('cprev').innerHTML='<span style="color:var(--text3);font-size:13px">Fill in width, length and profile to calculate cuts.</span>';return;}
  const p=PDATA[pr];if(!p)return;
  const tw=w+wf,th=h+hf;
  const cc=(tw+p.c).toFixed(3),cr=(tw+p.r).toFixed(3),cbr=(tw+p.br).toFixed(3),cbc=p.bc?(tw+p.bc).toFixed(3):'N/A';
  const fw=(parseFloat(cbr)-0.0625).toFixed(3);
  const fd2=(bt==='zebra'?(th+slat/2-0.625):(th+6)).toFixed(3);
  const px=fc?fc[0].toUpperCase():'',fm=((px==='Z'||px==='S')?parseFloat(fd2)*.0254*2:parseFloat(fd2)*.0254).toFixed(3);
  let cord='L';if(ct.startsWith('m'))cord='None';else if(th<30)cord='S';else if(th<45)cord='M';
  const brk=tw>59?3:2;
  $('cprev').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">
      ${[['Cassette',toFrac(cc),'#f5f3ff','var(--purple-text)'],['Core Roller',toFrac(cr),'#f5f3ff','var(--purple-text)'],['Bottom Rail',toFrac(cbr),'#f5f3ff','var(--purple-text)'],['Bottom Core',cbc!=='N/A'?toFrac(cbc):'N/A','#f5f3ff','var(--purple-text)']].map(([l,v,bg,c])=>`<div style="background:${bg};border-radius:7px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:${c};margin-bottom:3px">${l}</div><div style="font-size:16px;font-weight:800;font-family:monospace;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
      ${[['Fabric Width',toFrac(fw),'var(--green-bg)','var(--green-text)'],['Fabric Drop',toFrac(fd2),'var(--green-bg)','var(--green-text)'],['Metres Used',fm+'m','var(--green-bg)','var(--green-text)'],['Cord / Brackets',cord+' / '+brk+'×','#f8fafc','var(--text2)']].map(([l,v,bg,c])=>`<div style="background:${bg};border-radius:7px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:${c};margin-bottom:3px">${l}</div><div style="font-size:16px;font-weight:800;font-family:monospace;color:${c}">${v}</div></div>`).join('')}
    </div>`;
}
async function addWin(jid){
  if(!$('aww').value||!$('awh').value){toast('Width and height required','err');return;}
  if(!$('awpr').value){toast('Select a profile','err');return;}
  const win=await post('/api/jobs/'+jid+'/windows',{location:$('awl').value,blind_type:$('awbt').value,fabric_id:$('awfab').value?parseInt($('awfab').value):null,profile_code:$('awpr').value,cassette_colour:$('awcas').value,width_in:parseFloat($('aww').value)||0,width_frac:parseFloat($('awwf').value)||0,length_in:parseFloat($('awh').value)||0,length_frac:parseFloat($('awhf').value)||0,control_type:$('awct').value,lr_side:$('awlr').value,mount_type:$('awmt').value,notes:$('awn').value});
  closeModal();toast('Window added');_cJob.windows.push(win);
  document.querySelector('#wt').closest('.card').querySelector('.ch h2').textContent='Windows ('+_cJob.windows.length+')';
  renderWT(_cJob.windows,can('owner','admin','warehouse','factory'),can('owner','admin','sales','warehouse'));
}
async function printS(id,type){
  const {job,windows}=await get('/api/jobs/'+id+'/cutsheet');
  const iF=type==='fabric';
  const col=iF?'#166534':'#1d4ed8',bg2=iF?'#dcfce7':'#dbeafe';
  const title=iF?'Fabric Cut Sheet':'Hardware Cut Sheet',sub=iF?'For fabric team — not for client':'For hardware / metal team';

function _renderQuotes(quotes){
  $('tactions').innerHTML=`<button class="btn bp bsm" onclick="nav('quote-edit')">New Quote</button>`;
  function render(sq,sf){
    const list=quotes.filter(q=>{
      const matchS=!sq||[q.quote_number,q.client_name,q.rep_name].join(' ').toLowerCase().includes(sq.toLowerCase());
      const matchF=!sf||sf==='all'||q.status===sf;
      return matchS&&matchF;
    });
    $('qt_tbody').innerHTML=list.length?list.map(q=>{
      const paid=q.amount_paid||0;const bal=q.total-paid;
      return`<tr style="cursor:pointer" onclick="nav('quote-edit',${q.id})"><td><strong style="color:var(--accent)">${q.quote_number}</strong></td><td><strong>${q.client_name||'—'}</strong></td><td class="muted">${q.rep_name||'—'}</td><td class="muted">${q.items?.length||0}</td><td class="mono">$${fn(q.subtotal,2)}</td><td class="mono"><strong>$${fn(q.total,2)}</strong></td><td class="mono" style="color:${bal>0?'var(--amber)':'var(--green)'}">${paid>0?'$'+fn(paid,2):'—'}</td><td>${qb(q.status)}</td><td class="muted">${fd(q.created_at)}</td><td style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="btn bsec bxs" onclick="nav('quote-edit',${q.id})">Edit</button>${can('owner','admin')&&q.status==='accepted'?`<button class="btn bs bxs" onclick="cvtQ(${q.id})">→ Job</button>`:''} ${can('owner','admin')&&q.status==='draft'?`<button class="btn bsec bxs" onclick="uQ(${q.id},'sent')">Sent</button>`:''} ${q.status==='sent'?`<button class="btn bs bxs" onclick="uQ(${q.id},'accepted')">Accept</button>`:''}<button class="btn bg bxs" onclick="downloadPDF(${q.id},'quote')">PDF</button></td></tr>`;
    }).join(''):emp('No quotes match','Try a different search or filter');
  }
  $('content').innerHTML=`<div class="card"><div class="ch"><h2>Quotes (${quotes.length})</h2><div style="display:flex;gap:8px;align-items:center"><input id="qt_s" placeholder="Search by quote #, client, rep…" oninput="window._qtRender()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;width:240px"/><select id="qt_f" onchange="window._qtRender()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px"><option value="all">All Statuses</option><option value="draft">Draft</option><option value="sent">Sent</option><option value="accepted">Accepted</option><option value="converted">Converted</option></select></div></div><div class="tw"><table><thead><tr><th>Quote #</th><th>Client</th><th>Rep</th><th>Items</th><th>MSRP</th><th>Total</th><th>Paid</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="qt_tbody"></tbody></table></div></div>`;
  window._qtRender=()=>render($('qt_s')?.value||'',$('qt_f')?.value||'all');
  render('','all');
  setTimeout(()=>{const s=$('qt_s');if(s)s.focus();},50);
}

function qbU(i,key,val){
  _qb.dirty=true;
  _qb.items[i][key]=val;
  // When type changes, reset fabric_code and re-render for new dropdown options
  if(key==='blind_type'){
    _qb.items[i].fabric_code='';
    _qb.items[i].fabric_code_2='';
    _qb.items[i].hc_custom='';
    qbRenderRows();qbCalcTotals();return;
  }
  // Auto-price from lookup table when width or height changes (same prices for all types)
  if(['width_in','width_frac','length_in','length_frac'].includes(key)){
    const r=_qb.items[i];
    if(r.width_in>0&&r.length_in>0){
      const p=priceLookup(r.width_in,r.width_frac,r.length_in,r.length_frac);
      if(p>0){r.unit_price=r.blind_type==='Double Roller'?p*2:p;qbRenderRows();}
    }
  }
}
function qbAddRow(){
  _qb.dirty=true;
  _qb.items.push({location:'',blind_type:'Zebra',profile_code:'',fabric_code:'',fabric_code_2:'',hc_custom:'',cassette_colour:'White',width_in:0,width_frac:0,length_in:0,length_frac:0,control_type:'chain',lr_side:'R',control_type_2:'chain',lr_side_2:'L',mount_type:'in',qty:1,unit_price:0,discount_pct:0});
  qbRenderRows();qbCalcTotals();
}
function qbDupRow(i){_qb.dirty=true;_qb.items.splice(i+1,0,{..._qb.items[i]});qbRenderRows();qbCalcTotals();}
function qbDelRow(i){if(_qb.items.length<=1){toast('Need at least one item','err');return;}_qb.dirty=true;_qb.items.splice(i,1);qbRenderRows();qbCalcTotals();}
function qbCalcTotals(){
  const msrp=_qb.items.reduce((s,r)=>{const lt=(r.unit_price||0)*(r.qty||1);return s+(lt-lt*((r.discount_pct||0)/100));},0);
  const mk=parseFloat($('qb_markup')?.value)||0;
  const disc=parseFloat($('qb_disc')?.value)||0;
  const upg=parseFloat($('qb_upgrades')?.value)||0;
  const tax=5;
  const beforeDisc=msrp+mk;
  const afterDisc=beforeDisc*(1-disc/100);
  const beforeTax=afterDisc+upg;
  const taxAmt=beforeTax*(tax/100);
  const total=beforeTax+taxAmt;
  const paid=parseFloat($('qb_paid')?.value)||0;
  const balance=total-paid;
  $('qb_summary').innerHTML=`
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>MSRP:</span><span class="mono">$${fn(msrp,2)}</span></div>
    ${mk?`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>Markup:</span><span class="mono">+$${fn(mk,2)}</span></div>`:''}
    ${disc?`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>Discount (${disc}%):</span><span class="mono" style="color:var(--red)">-$${fn(beforeDisc*disc/100,2)}</span></div>`:''}
    ${upg?`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>Upgrades/Accessories:</span><span class="mono">+$${fn(upg,2)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>Tax (${tax}%):</span><span class="mono">$${fn(taxAmt,2)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:18px;font-weight:800"><span>Total:</span><span class="mono" style="color:var(--accent)">$${fn(total,2)}</span></div>
    ${paid>0?`<div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--border)"><span>Paid:</span><span class="mono" style="color:var(--green)">$${fn(paid,2)}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;font-weight:700"><span>Balance:</span><span class="mono" style="color:${balance>0?'var(--amber)':'var(--green)'}">$${fn(balance,2)}</span></div>`:''}`;
}
async function qbSave(){
  const cid=$('qb_client').value;
  if(!cid){toast('Select a customer','err');return;}
  if(!_qb.items.some(r=>r.location||r.unit_price)){toast('Add at least one line item','err');return;}
  const payload={
    client_id:parseInt(cid),items:_qb.items,
    customer_notes:$('qb_cnotes').value, terms:$('qb_terms').value,
    discount_pct:parseFloat($('qb_disc').value)||0,tax_pct:5,
    markup:parseFloat($('qb_markup').value)||0,
    upgrades:parseFloat($('qb_upgrades').value)||0,
    amount_paid:parseFloat($('qb_paid').value)||0,
    discount_reason:$('qb_dreason').value,
    hide_prices:$('qb_hide').checked,
    date_due:$('qb_ddue').value||null
  };
  try{
    if(_qb.editing){await api('PUT','/api/quotes/'+_qb.editing,payload);toast('Quote updated');}
    else{await post('/api/quotes',payload);toast('Quote created');}
    _qb.dirty=false;
    window.removeEventListener('beforeunload',_qbBeforeUnload);
    pcInvalidate('quotes');

  }catch(e){toast(e.message,'err');}
}

function downloadPDF(id, type){
  const url='/api/quotes/'+id+'/pdf?type='+(type||'quote');
  const a=document.createElement('a');
  a.href=url;
  a.download='';
  // Add auth header via fetch
  fetch(url,{headers:{'Authorization':'Bearer '+TOKEN}})
    .then(r=>{if(!r.ok)throw new Error('PDF generation failed');return r.blob();})
    .then(blob=>{
      const u=URL.createObjectURL(blob);
      a.href=u;a.download=(type==='invoice'?'Invoice':'Quote')+'-'+id+'.pdf';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(u);
      toast((type==='invoice'?'Invoice':'Quote')+' PDF downloaded');
    })
    .catch(e=>toast(e.message,'err'));
}

    try{
      await post('/api/fabrics',{
        catalogue_no:f.code,
        series:f.name,
        alias:f.name+' '+f.color+(f.filter?' — '+f.filter:''),
        colour_hex:'#cccccc',
        slat_size:parseFloat(f.slat)||3,
        roll_qty:0,total_meters:0
      });
      added++;
    }catch(e){console.error('Failed to add '+f.code,e);}
  }
  toast(added+' fabrics added from catalog');
  pcInvalidate('fabric');rFabric();
}
async function svFab(){
  const c=$('afc').value.trim(),n=$('afn').value.trim();if(!c||!n){toast('Code and name required','err');return;}
  await post('/api/fabrics',{catalogue_no:c,series:$('afse').value,alias:n,colour_hex:$('afh').value,slat_size:parseFloat($('afsl').value)||3,roll_qty:parseInt($('afr').value)||0,total_meters:parseFloat($('afm').value)||0});
  closeModal();toast('Fabric added');pcInvalidate('fabric');rFabric();
}
function mEditFab(id){

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--bg);border-radius:8px"><div style="width:44px;height:44px;border-radius:8px;background:${f.colour_hex};border:1px solid var(--border)"></div><div><strong style="font-size:14px">${f.alias}</strong><br><span style="font-size:12px;color:var(--text2)">${f.catalogue_no} · ${f.series||'—'}</span><br><span style="margin-top:4px;display:inline-block">${stBadge(f.remaining)}</span></div></div>
    <div class="fr2"><div class="fg"><label>Name</label><input id="efn" value="${f.alias}"/></div><div class="fg"><label>Colour</label><input type="color" id="efh" value="${f.colour_hex}"/></div><div class="fg"><label>Roll Qty</label><input type="number" id="efr" value="${f.roll_qty}"/></div><div class="fg"><label>Total Meters</label><input type="number" id="efm" value="${f.total_meters}" step="0.01"/></div></div>
  </div><div class="mf"><button class="btn bsec" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="svEFab(${id})">Save</button></div></div>`);
}
async function svEFab(id){await patch('/api/fabrics/'+id,{alias:$('efn').value,colour_hex:$('efh').value,roll_qty:parseInt($('efr').value),total_meters:parseFloat($('efm').value)});closeModal();toast('Updated');pcInvalidate('fabric');rFabric();}
</script>
<script>
// ── HARDWARE ──
async function rHardware(){

function mAddHw(){

    <div class="fr2"><div class="fg"><label>Category *</label><input id="ahc" placeholder="Valance / Head Rail"/></div><div class="fg"><label>Item Code</label><input id="ahco" placeholder="F5TYY"/></div></div>
    <div class="fg"><label>Description *</label><input id="ahd" placeholder="Full description and specifications"/></div>
    <div class="fr2"><div class="fg"><label>Unit</label><select id="ahu"><option value="meters">Meters</option><option value="count">Count</option></select></div><div class="fg"><label>Initial Qty</label><input type="number" id="ahq" value="0" step="0.1"/></div></div>
  </div><div class="mf"><button class="btn bsec" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="svHw()">Add Item</button></div></div>`);

async function svHw(){

async function svAHw(id){await patch('/api/hardware/'+id,{total_qty:parseFloat($('hqt').value),used_qty:parseFloat($('hqu').value)});closeModal();toast('Updated');rHardware();}

// ── SHIPMENTS ──
async function rShipments(){
  const s=await get('/api/shipments');
  $('tactions').innerHTML=`<button class="btn bp bsm" onclick="mNewShip()">Receive Shipment</button>`;
  $('content').innerHTML=`<div class="sg" style="grid-template-columns:repeat(3,1fr)"><div class="sc"><div class="slb">Total Shipments</div><div class="sv">${s.length}</div></div><div class="sc"><div class="slb">This Month</div><div class="sv">${s.filter(x=>new Date(x.date_received)>new Date(Date.now()-30*864e5)).length}</div></div><div class="sc"><div class="slb">Suppliers</div><div class="sv">${new Set(s.map(x=>x.supplier)).size}</div></div></div><div class="card"><div class="ch"><h2>Shipment History</h2></div>${s.length?s.map(x=>`<div style="border-bottom:1px solid var(--border);padding:14px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><strong style="font-size:14px">${x.supplier}</strong>${x.reference?` <span class="mono" style="font-size:12px;color:var(--text2)">${x.reference}</span>`:''}</div><span class="muted" style="font-size:12px">${fd(x.date_received)}</span></div><div style="display:flex;flex-wrap:wrap;gap:6px">${(x.items||[]).map(i=>`<div style="padding:4px 10px;border-radius:5px;border:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:7px"><span class="badge ${i.item_type==='fabric'?'bgr':'bbl'}">${i.item_type}</span><strong>${i.fabric_alias||i.hw_desc||'—'}</strong>${i.catalogue_no?`<span class="mono" style="font-size:10px">${i.catalogue_no}</span>`:''}<strong style="color:var(--accent)">+${i.qty_received}</strong></div>`).join('')}</div></div>`).join(''):`<div class="empty"><div class="et">No shipments recorded</div><div class="esb">Click "Receive Shipment" when materials arrive</div></div>`}</div>`;
}
async function mNewShip(){
  if(!_fabs.length)_fabs=await get('/api/fabrics');if(!_hw.length)_hw=await get('/api/hardware');
  let items=[];
  function ri(){$('silist').innerHTML=items.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${items.map((it,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--white);border:1px solid var(--border);border-radius:6px;font-size:12px"><span class="badge ${it.item_type==='fabric'?'bgr':'bbl'}">${it.item_type}</span><strong>${it.name}</strong> <strong style="color:var(--accent)">+${it.qty}</strong><button class="btn bg bxs" style="color:var(--red);padding:2px 5px" onclick="rsi(${i})">×</button></div>`).join('')}</div>`:`<span style="color:var(--text3);font-size:12px">No items added yet</span>`;}
  openModal(`<div class="md mlg"><div class="mh"><h3>Receive Shipment</h3><button class="mx" onclick="closeModal()">✕</button></div><div class="mb">
    <div class="fr2"><div class="fg"><label>Supplier *</label><input id="nss" placeholder="Supplier name"/></div><div class="fg"><label>Reference / PO #</label><input id="nsr" placeholder="PO-2026-001"/></div><div class="fg"><label>Date Received *</label><input type="date" id="nsd" value="${new Date().toISOString().split('T')[0]}"/></div><div class="fg"><label>Notes</label><input id="nsno" placeholder="Optional"/></div></div>
    <div class="fss">Items Received</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
      <div class="fg" style="flex:0 0 110px"><label>Type</label><select id="sit" onchange="loadSI()"><option value="fabric">Fabric</option><option value="hardware">Hardware</option></select></div>
      <div class="fg" style="flex:1;min-width:160px"><label>Item</label><select id="sii">${_fabs.map(f=>`<option value="${f.id}" data-n="${f.alias} (${f.catalogue_no})">${f.catalogue_no} — ${f.alias}</option>`).join('')}</select></div>
      <div class="fg" style="flex:0 0 100px"><label>Qty</label><input type="number" id="siq" value="50" step="0.1"/></div>
      <button class="btn bs bsm" onclick="asi()">Add</button>
    </div>
    <div id="silist" style="background:var(--bg);border-radius:7px;padding:10px;min-height:40px"></div>
  </div><div class="mf"><button class="btn bsec" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="svShip()">Save & Update Stock</button></div></div>`);
  ri();
  window.loadSI=()=>{const t=$('sit').value;$('sii').innerHTML=t==='fabric'?_fabs.map(f=>`<option value="${f.id}" data-n="${f.alias} (${f.catalogue_no})">${f.catalogue_no} — ${f.alias}</option>`).join(''):_hw.map(h=>`<option value="${h.id}" data-n="${h.description}">${h.category} — ${h.description}</option>`).join('');};
  window.asi=()=>{const t=$('sit').value,sel=$('sii'),n=sel.selectedOptions[0]?.dataset.n||'?',id=parseInt(sel.value),q=parseFloat($('siq').value)||0;if(!q){toast('Enter qty','err');return;}items.push({item_type:t,item_id:id,name:n,qty_received:q,qty:q});ri();};
  window.rsi=i=>{items.splice(i,1);ri();};
  window.svShip=async()=>{const sup=$('nss').value.trim();if(!sup){toast('Supplier required','err');return;}if(!items.length){toast('Add at least one item','err');return;}await post('/api/shipments',{supplier:sup,reference:$('nsr').value,date_received:$('nsd').value,notes:$('nsno').value,items});closeModal();toast('Shipment recorded — stock updated');rShipments();};
}

// ── TRANSFERS ──
async function rTransfers(){
  const ts=await get('/api/transfers');
  const pend=ts.filter(t=>t.status==='pending');
  $('tactions').innerHTML=can('owner','admin','warehouse')?`<button class="btn bp bsm" onclick="mNewTrf()">New Transfer</button>`:'';
  $('content').innerHTML=`<div class="sg" style="grid-template-columns:repeat(3,1fr)"><div class="sc"><div class="slb">Total Transfers</div><div class="sv">${ts.length}</div></div><div class="sc"><div class="slb">Pending</div><div class="sv">${pend.length}</div></div><div class="sc"><div class="slb">Delivered</div><div class="sv">${ts.filter(t=>t.status==='completed').length}</div></div></div>
  ${pend.length?`<div class="card"><div class="ch"><h2>Pending Transfers</h2></div>${pend.map(t=>`<div style="border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap"><div><strong>${t.transfer_no}</strong><br><span style="font-size:11px;color:var(--text3)">${fd(t.created_at)}</span></div><div style="display:flex;align-items:center;gap:8px;flex:1">${lp(t.from_location)}<span style="color:var(--text3)">→</span>${lp(t.to_location)}</div><div style="font-size:12px;color:var(--text2)">${(t.items||[]).map(i=>`${i.item_name} × ${i.qty}`).join(', ')}</div>${t.job_number?`<span class="badge bbl">${t.job_number}</span>`:''}<div style="display:flex;gap:6px"><button class="btn bs bsm" onclick="cTrf(${t.id})">Mark Delivered</button><button class="btn bg bsm" style="color:var(--red)" onclick="dTrf(${t.id})">Delete</button></div></div>`).join('')}</div>`:``}
  <div class="card"><div class="ch"><h2>All Transfers</h2></div><div class="tw"><table><thead><tr><th>Transfer #</th><th>Route</th><th>Items</th><th>Job</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>${ts.length?ts.map(t=>`<tr><td><strong>${t.transfer_no}</strong></td><td><div style="display:flex;align-items:center;gap:6px">${lp(t.from_location)}<span class="muted">→</span>${lp(t.to_location)}</div></td><td style="font-size:12px;color:var(--text2)">${(t.items||[]).map(i=>`${i.item_name} ×${i.qty}`).join(', ')}</td><td>${t.job_number?`<span class="badge bbl">${t.job_number}</span>`:'—'}</td><td class="muted">${fd(t.created_at)}</td><td>${t.status==='completed'?`<span class="badge bgr">Delivered</span>`:`<span class="badge bam">Pending</span>`}</td><td style="display:flex;gap:4px">${t.status==='pending'?`<button class="btn bs bxs" onclick="cTrf(${t.id})">Deliver</button>`:''}<button class="btn bg bxs" style="color:var(--red)" onclick="dTrf(${t.id})">Delete</button></td></tr>`).join(''):emp('No transfers yet','Move stock between Warehouse, Factory and Installer')}</tbody></table></div></div>`;
}
async function cTrf(id){await api('PATCH','/api/transfers/'+id+'/complete');toast('Transfer marked delivered');rTransfers();}
async function dTrf(id){if(!confirm('Delete transfer?'))return;await del('/api/transfers/'+id);toast('Deleted');rTransfers();}
async function mNewTrf(){
  if(!_fabs.length)_fabs=await get('/api/fabrics');if(!_hw.length)_hw=await get('/api/hardware');
  const jobs=await get('/api/jobs');let items=[];
  function ri(){$('tilist').innerHTML=items.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${items.map((it,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--white);border:1px solid var(--border);border-radius:6px;font-size:12px"><span class="badge ${it.item_type==='fabric'?'bgr':'bbl'}">${it.item_type}</span><strong>${it.item_name}</strong> ×${it.qty}<button class="btn bg bxs" style="color:var(--red);padding:2px 5px" onclick="rti(${i})">×</button></div>`).join('')}</div>`:`<span style="color:var(--text3);font-size:12px">No items added yet</span>`;}
  openModal(`<div class="md mlg"><div class="mh"><h3>New Stock Transfer</h3><button class="mx" onclick="closeModal()">✕</button></div><div class="mb">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap">
      <div class="fg" style="flex:1;min-width:130px"><label>From</label><select id="tff" style="font-weight:600">${LOCS.map(l=>`<option value="${l}" ${l==='Warehouse'?'selected':''}>${l}</option>`).join('')}</select></div>
      <div style="font-size:22px;color:var(--text3);padding-top:18px">→</div>
      <div class="fg" style="flex:1;min-width:130px"><label>To</label><select id="tft" style="font-weight:600">${LOCS.map(l=>`<option value="${l}" ${l==='Factory'?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fg" style="flex:1;min-width:140px"><label>Linked Job</label><select id="tfj"><option value="">— None —</option>${jobs.filter(j=>j.status!=='installed').slice(0,30).map(j=>`<option value="${j.id}">${j.job_number} — ${j.client_name||''}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>Notes</label><input id="tfno" placeholder="e.g. For install tomorrow"/></div>
    <div class="fss">Items to Transfer</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
      <div class="fg" style="flex:0 0 110px"><label>Type</label><select id="tit" onchange="loadTI()">${['fabric','hardware'].map(t=>`<option value="${t}">${t==='fabric'?'Fabric':'Hardware'}</option>`).join('')}</select></div>
      <div class="fg" style="flex:1;min-width:160px"><label>Item</label><select id="tii">${_fabs.map(f=>`<option value="${f.id}" data-n="${f.alias} (${f.catalogue_no})">${f.catalogue_no} — ${f.alias} (${fn(f.remaining,1)}m)</option>`).join('')}</select></div>
      <div class="fg" style="flex:0 0 90px"><label>Qty</label><input type="number" id="tiq" value="1" step="0.1"/></div>
      <button class="btn bs bsm" onclick="ati()">Add</button>
    </div>
    <div id="tilist" style="background:var(--bg);border-radius:7px;padding:10px;min-height:40px"></div>
  </div><div class="mf"><button class="btn bsec" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="svTrf()">Create Transfer</button></div></div>`);
  ri();
  window.loadTI=()=>{const t=$('tit').value;$('tii').innerHTML=t==='fabric'?_fabs.map(f=>`<option value="${f.id}" data-n="${f.alias} (${f.catalogue_no})">${f.catalogue_no} — ${f.alias} (${fn(f.remaining,1)}m)</option>`).join(''):_hw.map(h=>`<option value="${h.id}" data-n="${h.description}">${h.category} — ${h.description}</option>`).join('');};
  window.ati=()=>{const t=$('tit').value,sel=$('tii'),n=sel.selectedOptions[0]?.dataset.n||'?',id=parseInt(sel.value),q=parseFloat($('tiq').value)||0;if(!q){toast('Enter qty','err');return;}const ex=items.findIndex(x=>x.item_type===t&&x.item_id===id);if(ex>=0)items[ex].qty=parseFloat((items[ex].qty+q).toFixed(3));else items.push({item_type:t,item_id:id,item_name:n,qty:q});ri();};
  window.rti=i=>{items.splice(i,1);ri();};
  window.svTrf=async()=>{const fr=$('tff').value,to=$('tft').value;if(fr===to){toast('From and To must differ','err');return;}if(!items.length){toast('Add at least one item','err');return;}const r=await post('/api/transfers',{from_location:fr,to_location:to,job_id:$('tfj').value||null,notes:$('tfno').value,items});closeModal();toast('Transfer '+r.transfer_no+' created');rTransfers();};
}

// ── MOVEMENTS ──
async function rMovements(){
  const mv=await get('/api/movements');
  $('tactions').innerHTML='';
  const tcf={received:'bgr Received',allocated:'bbl Allocated',cut:'bpu Cut',wasted:'brd Wasted',adjusted:'bam Adjusted',transferred:'bgy Transferred'};
  $('content').innerHTML=`<div class="card"><div class="ch"><h2>Movement Log <span style="font-size:11px;color:var(--text3);font-weight:400">Last 200 entries</span></h2></div><div class="tw"><table><thead><tr><th>Date / Time</th><th>Item Type</th><th>Item</th><th>Movement</th><th>Qty</th><th>Job</th><th>Notes</th></tr></thead><tbody>${mv.length?mv.map(m=>{const[c,...l]=(tcf[m.movement_type]||'bgy '+m.movement_type).split(' ');return`<tr><td style="font-size:11px;white-space:nowrap" class="muted">${new Date(m.created_at).toLocaleString()}</td><td><span class="badge ${m.item_type==='fabric'?'bgr':'bbl'}">${m.item_type}</span></td><td><strong>${m.item_name||'—'}</strong></td><td><span class="badge ${c}">${l.join(' ')}</span></td><td><strong class="mono" style="color:${m.qty>0?'var(--green)':'var(--red)'}">${m.qty>0?'+':''}${fn(m.qty,3)}</strong></td><td>${m.job_id?`<span class="badge bbl">#${m.job_id}</span>`:'—'}</td><td style="font-size:11px" class="muted">${m.notes||''}</td></tr>`}).join(''):emp('No movements recorded','Stock movements appear here automatically')}</tbody></table></div></div>`;
}
</script>
<script>
// ── TASKS ──
async function rTasks(){
  const tasks=await get('/api/tasks');
  $('tactions').innerHTML=`<button class="btn bp bsm" onclick="mNewTask()">New Task</button>`;
  let tf='all';
  function render(f){
    const list=f==='all'?tasks:tasks.filter(t=>t.status===f);
    $('tasktb').innerHTML=list.length?list.map(t=>`<tr><td><strong>${t.title}</strong>${t.description?`<br><span style="font-size:11px;color:var(--text3)">${t.description}</span>`:''}</td><td class="muted">${t.assigned_name||'Unassigned'}</td><td>${pb(t.priority)}</td><td class="muted">${fd(t.due_date)}</td><td>${t.job_number?`<span class="badge bbl">${t.job_number}</span>`:'—'}</td><td>${tb(t.status)}</td><td style="display:flex;gap:4px">${t.status!=='done'?`<button class="btn bs bxs" onclick="utask(${t.id},'done')">Done</button>`:''} ${t.status==='pending'?`<button class="btn bsec bxs" onclick="utask(${t.id},'in_progress')">Start</button>`:''}<button class="btn bg bxs" style="color:var(--red)" onclick="dtask(${t.id})">Delete</button></td></tr>`).join(''):emp('No tasks found','');
  }
  $('content').innerHTML=`<div class="tabs" id="tftabs">${['all','pending','in_progress','done'].map(s=>`<button class="tab ${s==='all'?'active':''}" data-s="${s}" onclick="setTF('${s}')">${s==='all'?'All':s.replace('_',' ')}</button>`).join('')}</div><div class="card"><div class="tw"><table><thead><tr><th>Task</th><th>Assigned To</th><th>Priority</th><th>Due Date</th><th>Job</th><th>Status</th><th>Actions</th></tr></thead><tbody id="tasktb"></tbody></table></div></div>`;
  render('all');
  window.setTF=f=>{document.querySelectorAll('#tftabs .tab').forEach(b=>b.classList.toggle('active',b.dataset.s===f));render(f);};
  window.utask=async(id,s)=>{await patch('/api/tasks/'+id,{status:s});toast('Task updated');rTasks();};

async function rCalendar(){

async function loadCal(){
  const events=await get(`/api/calendar?month=${calM}&year=${calY}`);
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('calml').textContent=`${months[calM-1]} ${calY}`;
  const first=new Date(calY,calM-1,1).getDay(),days=new Date(calY,calM,0).getDate();
  const today=new Date(),em={};
  events.forEach(e=>{const d=(e.start_date||'').split('T')[0];if(!em[d])em[d]=[];em[d].push(e);});
  const ec={install:'ei',measure:'em2',meeting:'eme',other:'eot'};
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cd com"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isTd=today.getFullYear()===calY&&today.getMonth()===calM-1&&today.getDate()===d;
    const de=em[ds]||[];
    cells+=`<div class="cd ${isTd?'ct':''}"><div class="cdn">${d}</div>${de.slice(0,3).map(e=>`<div class="cev ${ec[e.event_type]||'eot'}" title="${e.title}${e.assigned_name?' — '+e.assigned_name:''}">${e.title}</div>`).join('')}${de.length>3?`<div style="font-size:10px;color:var(--text3)">+${de.length-3} more</div>`:''}</div>`;
  }
  $('content').innerHTML=`<div class="cg" style="margin-bottom:2px">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cdh">${d}</div>`).join('')}</div><div class="cg">${cells}</div>${events.length?`<div class="card" style="margin-top:16px"><div class="ch"><h2>Events This Month</h2></div><div class="tw"><table><thead><tr><th>Date</th><th>Event</th><th>Type</th><th>Assigned</th><th>Job</th><th></th></tr></thead><tbody>${events.map(e=>`<tr><td class="muted">${fd(e.start_date)}</td><td><strong>${e.title}</strong>${e.notes?`<br><span style="font-size:11px;color:var(--text3)">${e.notes}</span>`:''}</td><td><span class="badge ${e.event_type==='install'?'bgr':e.event_type==='measure'?'bbl':e.event_type==='meeting'?'bpu':'bgy'}">${{install:'Install',measure:'Measure',meeting:'Meeting',other:'Other'}[e.event_type]||e.event_type}</span></td><td class="muted">${e.assigned_name||'—'}</td><td>${e.job_number?`<span class="badge bbl">${e.job_number}</span>`:'—'}</td><td>${can('owner','admin')?`<button class="btn bg bxs" style="color:var(--red)" onclick="dEv(${e.id})">Delete</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`:''}`;
}
function calNav(d){calM+=d;if(calM>12){calM=1;calY++;}else if(calM<1){calM=12;calY--;}loadCal();}

];
const PROD_COL=[
  {title:'Cut',stages:['pending','cutting'],next:'start_cut',done:'finish_cut',color:'#2563eb'},

async function rProduction(){
  const [queue,stats]=await Promise.all([get('/api/production'),get('/api/production/stats')]);
  $('tactions').innerHTML='';

  // Stats bar
  const total=queue.length;
  const inProg=(stats.cutting||0)+(stats.assembling||0)+(stats.packing||0);
  const done=(stats.packed||0);
  const failed=(stats.qc_fail||0);

  let html=`<div class="sg"><div class="sc"><div class="slb">Total Windows</div><div class="sv">${total}</div></div><div class="sc"><div class="slb">In Progress</div><div class="sv">${inProg}</div></div><div class="sc"><div class="slb">Completed</div><div class="sv">${done}</div></div><div class="sc" ${failed?'style="border-color:#fecaca"':''}><div class="slb">QC Failed</div><div class="sv" ${failed?'style="color:var(--red)"':''}>${failed}</div></div></div>`;

  // Kanban columns
  html+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:400px">`;
  PROD_COL.forEach(col=>{
    const items=queue.filter(w=>col.stages.includes(w.production_status));
    html+=`<div style="background:var(--bg);border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;min-height:300px">`;
    html+=`<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${col.color}"></div><span style="font-size:13px;font-weight:700">${col.title}</span></div><span style="background:${col.color}15;color:${col.color};font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px">${items.length}</span></div>`;
    html+=`<div style="padding:8px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px">`;
    if(!items.length) html+=`<div style="text-align:center;padding:24px 10px;color:var(--text3);font-size:12px">No items</div>`;
    items.forEach(w=>{
      const isActive=w.production_status==='cutting'||w.production_status==='assembling'||w.production_status==='packing';
      html+=`<div style="background:var(--white);border:1px solid ${isActive?col.color+'60':'var(--border)'};border-radius:8px;padding:10px 12px;${isActive?'box-shadow:0 0 0 2px '+col.color+'20;':''}">`;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong style="font-size:12px;color:var(--accent);cursor:pointer" onclick="nav('job-detail',${w.job_id})">${w.job_number}</strong>${prodBadge(w.production_status)}</div>`;
      html+=`<div style="font-size:12px;font-weight:600;margin-bottom:2px">Window ${w.window_no} — ${w.location||'—'}</div>`;
      html+=`<div style="font-size:11px;color:var(--text2);margin-bottom:2px">${w.client_name||'—'}</div>`;
      html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">`;
      html+=`<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:#f5f3ff;color:#6d28d9;font-weight:600">${(w.blind_type||'').toUpperCase()} ${w.profile_code||''}</span>`;
      html+=`<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:#f1f5f9;color:#475569">${w.catalogue_no||'—'}</span>`;
      if(w.date_due)html+=`<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:#fffbeb;color:#92400e">Due ${w.date_due}</span>`;
      html+=`</div>`;
      // Action buttons
      html+=`<div style="display:flex;gap:4px;flex-wrap:wrap">`;
      if(col.title==='Cut'){
        if(w.production_status==='pending')html+=`<button class="btn bp bxs" onclick="prodAction(${w.id},'start_cut')">Start Cutting</button>`;
        if(w.production_status==='cutting')html+=`<button class="btn bs bxs" onclick="prodAction(${w.id},'finish_cut')">Done Cutting</button>`;
      }
      if(col.title==='Assemble'){
        if(w.production_status==='cut'||w.production_status==='qc_fail')html+=`<button class="btn bp bxs" style="background:#7c3aed" onclick="prodAction(${w.id},'start_assemble')">${w.production_status==='qc_fail'?'Rework':'Start Assembly'}</button>`;
        if(w.production_status==='assembling')html+=`<button class="btn bs bxs" onclick="prodAction(${w.id},'finish_assemble')">Done Assembly</button>`;
      }
      if(col.title==='QC'){
        html+=`<button class="btn bs bxs" onclick="prodAction(${w.id},'qc_pass')">Pass</button>`;
        html+=`<button class="btn bd bxs" onclick="prodQCFail(${w.id})">Fail</button>`;
      }
      if(col.title==='Pack'){
        if(w.production_status==='qc_pass')html+=`<button class="btn bp bxs" style="background:#ea580c" onclick="prodAction(${w.id},'start_pack')">Start Packing</button>`;
        if(w.production_status==='packing')html+=`<button class="btn bs bxs" onclick="prodAction(${w.id},'finish_pack')">Done Packing</button>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;

  // Packed / completed section
  const packed=queue.filter(w=>w.production_status==='packed');
  if(packed.length){
    html+=`<div class="card" style="margin-top:16px"><div class="ch"><h2>Completed (${packed.length})</h2></div><div class="tw"><table><thead><tr><th>Job</th><th>Window</th><th>Location</th><th>Type</th><th>Fabric</th><th>Client</th><th>Cut By</th><th>Assembled By</th><th>QC By</th><th>Packed By</th></tr></thead><tbody>${packed.map(w=>`<tr><td><a style="color:var(--accent);cursor:pointer;font-weight:600" onclick="nav('job-detail',${w.job_id})">${w.job_number}</a></td><td>${w.window_no}</td><td>${w.location||'—'}</td><td><span class="badge bpu">${(w.blind_type||'').toUpperCase()} ${w.profile_code||''}</span></td><td class="muted">${w.catalogue_no||'—'}</td><td>${w.client_name||'—'}</td><td class="muted">${w.cut_by||'—'}</td><td class="muted">${w.assembled_by||'—'}</td><td class="muted">${w.qc_by||'—'}</td><td class="muted">${w.packed_by||'—'}</td></tr>`).join('')}</tbody></table></div></div>`;
  }

  $('content').innerHTML=html;
}

let _csvData=null;
function parseCSVDim(s){
  // Parse "69.0 1/8"" or "69.0"" or "69 3/4""
  if(!s)return{whole:0,frac:0};
  s=s.replace(/"/g,'').trim();
  const parts=s.split(/\s+/);
  const whole=Math.round(parseFloat(parts[0])||0);
  let fr=0;
  if(parts[1]){
    const fp=parts[1].split('/');
    if(fp.length===2)fr=parseFloat(fp[0])/parseFloat(fp[1]);
  }
  // Snap to nearest 1/8
  fr=Math.round(fr*8)/8;
  return{whole,frac:fr};
}
function parseAurooCSV(text){
  const lines=text.split(/\r?\n/);
  let section='',result={header:{},billTo:{},items:[],addons:[],totals:{},notes:''};
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;
    if(line==='QUOTE HEADER'){section='header';continue;}
    if(line==='BILL TO'){section='billto';continue;}
    if(line==='LINE ITEMS'){section='items';continue;}
    if(line==='ADDONS'){section='addons';continue;}
    if(line==='TOTALS'){section='totals';continue;}
    if(line==='NOTES'){section='notes';continue;}
    // Skip header rows (column labels)
    if(section==='header'&&line.startsWith('Quote Number'))continue;
    if(section==='billto'&&line.startsWith('Customer Name'))continue;
    if(section==='items'&&line.startsWith('#,'))continue;
    if(section==='addons'&&line.startsWith('Addon,'))continue;
    if(section==='totals'&&line.startsWith('MSRP,'))continue;
    // Parse CSV line respecting potential commas in values
    const cols=line.match(/(".*?"|[^,]*),?/g)?.map(c=>c.replace(/,$/,'').replace(/^"|"$/g,'').trim())||[];
    if(section==='header'&&cols.length>=2){
      result.header={quote_number:cols[0],date:cols[1],status:cols[2],company:cols[3],address:cols[4],city:cols[5],province:cols[6],postal:cols[7]};
    }else if(section==='billto'&&cols.length>=2){
      result.billTo={name:cols[0],phone:cols[1],address:cols[2]||''};
    }else if(section==='items'&&cols.length>=10){
      const wd=parseCSVDim(cols[5]),hd=parseCSVDim(cols[6]);
      result.items.push({
        num:parseInt(cols[0])||0,location:cols[1],blind_type:cols[2],
        fabric_code:cols[3],cassette:cols[4],
        width_in:wd.whole,width_frac:wd.frac,
        length_in:hd.whole,length_frac:hd.frac,
        control:cols[7],lr:cols[8],mount:cols[9],
        qty:parseInt(cols[10])||1,
        unit_price:parseFloat((cols[11]||'').replace(/[$,]/g,''))||0,
        discount:cols[12],
        total:parseFloat((cols[13]||'').replace(/[$,]/g,''))||0
      });
    }else if(section==='addons'&&cols.length>=3){
      result.addons.push({name:cols[0],qty:parseInt(cols[1])||1,price:parseFloat((cols[2]||'').replace(/[$,]/g,''))||0});
    }else if(section==='totals'&&cols.length>=4){
      result.totals={msrp:parseFloat((cols[0]||'').replace(/[$,]/g,''))||0,addons:parseFloat((cols[1]||'').replace(/[$,]/g,''))||0,subtotal:parseFloat((cols[2]||'').replace(/[$,]/g,''))||0,tax_pct:parseFloat((cols[3]||'').replace(/%/g,''))||5,tax_amount:parseFloat((cols[4]||'').replace(/[$,]/g,''))||0,total:parseFloat((cols[5]||'').replace(/[$,]/g,''))||0};
    }else if(section==='notes'){
      result.notes+=(result.notes?'\n':'')+line;
    }
  }
  return result;
}

async function handleCSVFile(input){
  if(!input.files.length)return;
  const text=await input.files[0].text();
  _csvData=parseAurooCSV(text);
  if(!_csvData.items.length){toast('No line items found in CSV','err');return;}
  // Load fabrics & profiles for mapping
  _fabs=await get('/api/fabrics');_profs=await get('/api/profiles');
  closeModal();
  showCSVReview();
}

function matchFabric(code){
  if(!code)return null;
  const c=code.toUpperCase().trim();
  return _fabs.find(f=>f.catalogue_no.toUpperCase()===c)||null;
}
function guessProfile(blindType,control){
  const t=(blindType||'').toLowerCase(),ct=(control||'').toLowerCase();
  if(t==='zebra'){
    if(ct.includes('cordless'))return'D';
    if(ct.includes('motor')&&!ct.includes('tubular'))return'B';
    if(ct.includes('tubular'))return'I';
    return'A';
  }
  if(t==='roller'||t==='sunscreen'){
    if(ct.includes('tubular'))return'J';
    if(ct.includes('motor'))return'G';
    if(ct.includes('cordless'))return'D';
    return'F';
  }
  if(t==='honeycomb roman shades')return'A';
  return'A';
}
function mapControl(ctrl){
  const c=(ctrl||'').toLowerCase();
  if(c.includes('motor')&&c.includes('tubular'))return'motor-tubular';
  if(c.includes('motor'))return'motor';
  if(c.includes('cordless'))return'chain';
  if(c.includes('wand'))return'wand';
  return'chain';
}
function mapMount(m){return(m||'').toLowerCase().startsWith('in')?'in':'out';}

  </div></div>

  <div class="card"><div class="ch"><h2>Windows (${rows.length}) — Review and Edit</h2><div style="display:flex;gap:6px">

      <th style="background:#f0fdf4">Metres</th>
      <th>Cord</th><th>Brk</th>
      <th>Qty</th><th>Unit $</th>
      <th style="width:40px"></th>
    </tr></thead>
    <tbody id="csvtb"></tbody>
    </table>
  </div></div>

  ${d.addons.length?`<div class="card"><div class="ch"><h2>Addons</h2></div><div class="tw"><table><thead><tr><th>Addon</th><th>Qty</th><th>Price</th></tr></thead><tbody>${d.addons.map(a=>`<tr><td>${a.name}</td><td>${a.qty}</td><td>$${fn(a.price,2)}</td></tr>`).join('')}</tbody></table></div></div>`:''}

  ${d.notes?`<div class="card"><div style="padding:14px 18px"><div class="fss" style="margin-top:0">Notes</div><div style="font-size:13px;color:var(--text2)">${d.notes}</div></div></div>`:''}

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;padding-bottom:20px">
    <button class="btn bsec" onclick="nav('jobs')">Cancel Import</button>
    <button class="btn bp" style="padding:10px 24px;font-size:14px" onclick="csvSaveAll()">Create Job with ${rows.length} Windows</button>
  </div>`;

  $('content').innerHTML=html;
  renderCSVRows(fo,fabOpts,profOpts);
  csvRecalcAll();
}

function renderCSVRows(fo,fabOpts,profOpts){
  // Cache options if not passed
  if(fo)window._csvFO=fo;else fo=window._csvFO;
  if(fabOpts)window._csvFabOpts=fabOpts;else fabOpts=window._csvFabOpts;
  if(profOpts)window._csvProfOpts=profOpts;else profOpts=window._csvProfOpts;
  const rows=window._csvRows;
  $('csvtb').innerHTML=rows.map((r,i)=>`<tr id="csvr${i}">
    <td class="muted">${i+1}</td>
    <td><input value="${r.location||''}" onchange="csvU(${i},'location',this.value)" style="width:110px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px"/></td>
    <td><select onchange="csvU(${i},'blind_type',this.value);csvAutoProfile(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      ${['Zebra','Roller','Sunscreen','Honeycomb Roman Shades'].map(t=>`<option ${r.blind_type===t?'selected':''}>${t}</option>`).join('')}
    </select></td>
    <td><select onchange="csvU(${i},'fabric_id',this.value)" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;max-width:140px">${fabOpts.replace(`value="${r.fabric_id}"`,`value="${r.fabric_id}" selected`)}</select></td>
    <td><select onchange="csvU(${i},'profile_code',this.value);csvCalcRow(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;max-width:160px">${profOpts.replace(`value="${r.profile_code}"`,`value="${r.profile_code}" selected`)}</select></td>
    <td><select onchange="csvU(${i},'cassette_colour',this.value);csvCalcRow(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      ${['White','Black','Grey','Silver','Mill'].map(c=>`<option ${r.cassette_colour===c?'selected':''}>${c}</option>`).join('')}
    </select></td>
    <td><input type="number" value="${r.width_in}" onchange="csvU(${i},'width_in',parseFloat(this.value)||0);csvCalcRow(${i})" style="width:50px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center"/></td>
    <td><select onchange="csvU(${i},'width_frac',parseFloat(this.value)||0);csvCalcRow(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">${fo.replace(`value="${r.width_frac}"`,`value="${r.width_frac}" selected`)}</select></td>
    <td><input type="number" value="${r.length_in}" onchange="csvU(${i},'length_in',parseFloat(this.value)||0);csvCalcRow(${i})" style="width:50px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center"/></td>
    <td><select onchange="csvU(${i},'length_frac',parseFloat(this.value)||0);csvCalcRow(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">${fo.replace(`value="${r.length_frac}"`,`value="${r.length_frac}" selected`)}</select></td>
    <td><select onchange="csvU(${i},'mount_type',this.value)" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      <option value="in" ${r.mount_type==='in'?'selected':''}>Inside</option><option value="out" ${r.mount_type==='out'?'selected':''}>Outside</option>
    </select></td>
    <td><select onchange="csvU(${i},'control_type',this.value);csvCalcRow(${i})" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      ${[['chain','Chain'],['wand','Wand'],['motor','Motor'],['motor-tubular','Motor Tub.']].map(([v,l])=>`<option value="${v}" ${r.control_type===v?'selected':''}>${l}</option>`).join('')}
    </select></td>
    <td><select onchange="csvU(${i},'lr_side',this.value)" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      <option value="R" ${r.lr_side==='R'?'selected':''}>R</option><option value="L" ${r.lr_side==='L'?'selected':''}>L</option>
    </select></td>
    <td class="mono" style="background:#f5f3ff;font-weight:700" id="csv_cc${i}">—</td>
    <td class="mono" style="background:#f5f3ff;font-weight:700" id="csv_cr${i}">—</td>
    <td class="mono" style="background:#f5f3ff;font-weight:700" id="csv_br${i}">—</td>
    <td class="mono" style="background:#f5f3ff;font-weight:700" id="csv_bc${i}">—</td>
    <td class="mono" style="background:#f0fdf4;font-weight:700;color:var(--green-text)" id="csv_fw${i}">—</td>
    <td class="mono" style="background:#f0fdf4;font-weight:700;color:var(--green-text)" id="csv_fd${i}">—</td>
    <td class="mono" style="background:#f0fdf4;font-weight:700;color:var(--green-text)" id="csv_fm${i}">—</td>

    <td><input type="number" value="${r.unit_price||0}" onchange="csvU(${i},'unit_price',parseFloat(this.value)||0)" style="width:70px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px" step="0.01"/></td>
