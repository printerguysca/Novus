}
function csvU(i,key,val){window._csvRows[i][key]=val;}
function csvAutoProfile(i){
  const r=window._csvRows[i];
  r.profile_code=guessProfile(r.blind_type,r.control_type);
  renderCSVRows();csvRecalcAll();
}
function csvCalcRow(i){
  const r=window._csvRows[i];
  const pr=PDATA[r.profile_code];if(!pr)return;
  const tw=(r.width_in||0)+(r.width_frac||0);
  const tl=(r.length_in||0)+(r.length_frac||0);
  const cc=(tw+pr.c).toFixed(3),cr=(tw+pr.r).toFixed(3);
  const cbr=(tw+pr.br).toFixed(3),cbc=pr.bc?(tw+pr.bc).toFixed(3):'N/A';
  const fw=(parseFloat(cbr)-0.0625).toFixed(3);
  const fab=r.fabric_id?_fabs.find(f=>f.id==r.fabric_id):matchFabric(r.fabric_code);
  const fc=fab?fab.catalogue_no:'';
  const px=fc?fc[0].toUpperCase():'';
  const bt=(r.blind_type||'').toLowerCase();
  // For double roller, infer each fabric's type from its own prefix
  const effType=bt==='double roller'?((px==='Z'||px==='S')?'zebra':'roller'):bt;
  const fd2=(effType==='zebra'?(tl+(fab?.slat_size||3)/2-0.625):(tl+6)).toFixed(3);
  const fm=((px==='Z'||px==='S')?parseFloat(fd2)*0.0254*2:parseFloat(fd2)*0.0254).toFixed(3);
  const ctrl=(r.control_type||'').toLowerCase();
  const cord=ctrl.startsWith('m')?'None':tl<30?'S':tl<45?'M':'L';
  const brk=tw>59?3:2;
  // Update cells
  const el=id=>document.getElementById(id);
  if(el('csv_cc'+i))el('csv_cc'+i).textContent=toFrac(cc);
  if(el('csv_cr'+i))el('csv_cr'+i).textContent=toFrac(cr);
  if(el('csv_br'+i))el('csv_br'+i).textContent=toFrac(cbr);
  if(el('csv_bc'+i))el('csv_bc'+i).textContent=cbc!=='N/A'?toFrac(cbc):'N/A';
  if(el('csv_fw'+i))el('csv_fw'+i).textContent=toFrac(fw);
  if(el('csv_fd'+i))el('csv_fd'+i).textContent=toFrac(fd2);
  if(el('csv_fm'+i))el('csv_fm'+i).textContent=fm+'m';
  if(el('csv_cord'+i))el('csv_cord'+i).textContent=cord;
  if(el('csv_brk'+i))el('csv_brk'+i).textContent=brk+'×';
  // Store cuts on row for save
  r._cuts={cut_cassette:parseFloat(cc),cut_roller:parseFloat(cr),cut_bottom_rail:parseFloat(cbr),cut_bottom_core:cbc!=='N/A'?parseFloat(cbc):0,cut_fabric_width:parseFloat(fw),cut_fabric_drop:parseFloat(fd2),fabric_meters:parseFloat(fm),cord_wand_size:cord,bracket_count:brk};
}
function csvRecalcAll(){window._csvRows.forEach((_,i)=>csvCalcRow(i));}
function csvAddRow(){
  window._csvRows.push({location:'',blind_type:'Zebra',fabric_code:'',fabric_id:'',profile_code:'A',cassette_colour:'White',width_in:0,width_frac:0,length_in:0,length_frac:0,control_type:'chain',lr_side:'R',mount_type:'in',qty:1,unit_price:0});
  renderCSVRows();csvRecalcAll();
  // Update header count
  const h=document.querySelector('#content .ch h2');if(h)h.textContent='Windows ('+window._csvRows.length+') — Review and Edit';
  // Update save button
  const sb=document.querySelector('#content .btn.bp[onclick*="csvSaveAll"]');if(sb)sb.textContent='Create Job with '+window._csvRows.length+' Windows';
}
function csvDelRow(i){
  window._csvRows.splice(i,1);
  renderCSVRows();csvRecalcAll();
  const h=document.querySelector('#content .ch h2');if(h)h.textContent='Windows ('+window._csvRows.length+') — Review and Edit';
  const sb=document.querySelector('#content .btn.bp[onclick*="csvSaveAll"]');if(sb)sb.textContent='Create Job with '+window._csvRows.length+' Windows';
}
async function csvSaveAll(){
  const rows=window._csvRows;
  if(!rows.length){toast('No windows to save','err');return;}
  const cname=$('csv_cname').value.trim();
  if(!cname){toast('Customer name required','err');return;}
  const d=_csvData;
  const payload={
    client:{name:cname,phone:$('csv_cphone').value,address:$('csv_caddr').value},
    windows:rows.map(r=>({
      location:r.location,fabric_id:r.fabric_id?parseInt(r.fabric_id):null,
      profile_code:r.profile_code,cassette_colour:r.cassette_colour,
      width_in:r.width_in,width_frac:r.width_frac,
      length_in:r.length_in,length_frac:r.length_frac,
      control_type:r.control_type,lr_side:r.lr_side,mount_type:r.mount_type,
      blind_type:r.blind_type,qty:r.qty||1,unit_price:r.unit_price||0
    })),
    notes:d.notes||''
  };
  if(d.header.quote_number){
    payload.quote={
      quote_number:d.header.quote_number,
      subtotal:d.totals.subtotal||0,
      discount_pct:0,
      tax_pct:d.totals.tax_pct||5,
      total:d.totals.total||0,
      notes:d.notes||''
    };
  }
  try{
    const r=await post('/api/jobs/import',payload);
    toast('Job '+r.job_number+' created with '+rows.length+' windows');
    nav('job-detail',r.job_id);
  }catch(e){toast(e.message,'err');}
}

boot();
