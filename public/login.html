<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Novus — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:420px;}
.brand{text-align:center;margin-bottom:36px;}
.brand-logo{width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.brand-logo svg{border-radius:14px;}
.brand-name{color:#fff;font-size:28px;font-weight:700;letter-spacing:1px;}
.card{background:#fff;border:none;border-radius:16px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.25);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#e8580c,#f97316,#e8580c);}
.card-title{color:#0f172a;font-size:18px;font-weight:700;margin-bottom:4px;}
.card-sub{color:#64748b;font-size:13px;margin-bottom:24px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
.fg input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;color:#0f172a;outline:none;transition:border .15s,box-shadow .15s;background:#fff;}
.fg input:focus{border-color:#e8580c;box-shadow:0 0 0 3px rgba(232,88,12,.12);}
.fg input::placeholder{color:#9ca3af;}
.btn-login{width:100%;padding:12px;background:#e8580c;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .15s;margin-top:4px;letter-spacing:.3px;}
.btn-login:hover{background:#c2410c;transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,88,12,.3);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.error.show{display:block;}
.divider{border:none;border-top:1px solid #e2e8f0;margin:24px 0;}
.demo-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.demo-btn{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 10px;cursor:pointer;text-align:left;transition:all .15s;}
.demo-btn:hover{background:#fff7ed;border-color:#fed7aa;transform:translateY(-1px);}
.demo-role{font-size:12px;font-weight:600;color:#0f172a;}
.demo-desc{font-size:11px;color:#64748b;margin-top:1px;}
.demo-btn .role-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 64 64" width="64" height="64"><rect width="64" height="64" rx="14" fill="#1e293b"/><g transform="translate(10,10)"><rect x="0" y="0" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".3"/><rect x="0" y="7" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".5"/><rect x="0" y="14" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".7"/><rect x="0" y="21" width="44" height="5" rx="1.5" fill="#e8580c" opacity=".85"/><rect x="0" y="28" width="44" height="5" rx="1.5" fill="#e8580c"/><rect x="0" y="35" width="44" height="9" rx="1.5" fill="#e8580c"/><path d="M0 0L0 44L9 44L9 17L35 44L44 44L44 0L35 0L35 27L9 0Z" fill="#1e293b" fill-rule="evenodd"/></g></svg>
    </div>
    <div class="brand-name">Novus</div>
  </div>
  <div class="card">
    <div class="card-title">Sign in to your account</div>
    <div class="card-sub">Enter your credentials to continue</div>
    <div class="error" id="err">Invalid email or password. Please try again.</div>
    <form onsubmit="doLogin(event)">
      <div class="fg">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@soho.ca" autocomplete="email" required/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>
    <hr class="divider"/>
    <div class="demo-label">Demo accounts</div>
    <div class="demo-grid">
      <button class="demo-btn" onclick="fill('owner@soho.ca','owner123')"><span class="role-dot" style="background:#7c3aed"></span><div class="demo-role">Owner</div><div class="demo-desc">Full access</div></button>
      <button class="demo-btn" onclick="fill('admin@soho.ca','admin123')"><span class="role-dot" style="background:#0d9488"></span><div class="demo-role">Office Admin</div><div class="demo-desc">Calendar, jobs, tasks</div></button>
      <button class="demo-btn" onclick="fill('sales@soho.ca','sales123')"><span class="role-dot" style="background:#2563eb"></span><div class="demo-role">Sales Rep</div><div class="demo-desc">Clients, quotes</div></button>
      <button class="demo-btn" onclick="fill('warehouse@soho.ca','warehouse123')"><span class="role-dot" style="background:#ea580c"></span><div class="demo-role">Warehouse</div><div class="demo-desc">Stock, cut sheets</div></button>
      <button class="demo-btn" onclick="fill('installer@soho.ca','installer123')"><span class="role-dot" style="background:#d97706"></span><div class="demo-role">Installer</div><div class="demo-desc">Schedule, my jobs</div></button>
      <button class="demo-btn" onclick="fill('factory@soho.ca','factory123')"><span class="role-dot" style="background:#16a34a"></span><div class="demo-role">Factory Floor</div><div class="demo-desc">Cut queue</div></button>
    </div>
  </div>
</div>
<script>
if(localStorage.getItem('wms_token'))window.location.href='/';
function fill(e,p){document.getElementById('email').value=e;document.getElementById('password').value=p;}
async function doLogin(ev){
  ev.preventDefault();
  const btn=document.getElementById('login-btn'),err=document.getElementById('err');
  err.classList.remove('show');btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('wms_token',d.token);localStorage.setItem('wms_user',JSON.stringify(d.user));
    window.location.href='/';
  }catch(e){err.textContent=e.message;err.classList.add('show');btn.disabled=false;btn.textContent='Sign In';}
}
</script>
</body>
</html>
